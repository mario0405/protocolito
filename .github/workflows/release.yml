name: Release desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm fakeroot
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Prepare packaging icons
        shell: bash
        run: |
          mkdir -p build
          cp resources/app_icon.ico build/app_icon.ico
          cp resources/icon.png build/icon.png

      - name: Package Windows app
        if: runner.os == 'Windows'
        run: npx electron-builder --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: npx electron-builder --mac dmg --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: protocolito-${{ runner.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          body: |
            ## Download Protocolito

            Choose the installer for your operating system:

            | Platform | Recommended download |
            | --- | --- |
            | Windows | [Protocolito-Windows-Setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Protocolito-Windows-Setup.exe) |
            | macOS | [Protocolito-macOS.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Protocolito-macOS.dmg) |
            | Linux | [Protocolito-Linux.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Protocolito-Linux.AppImage) |
            | Debian / Ubuntu | [Protocolito-Linux.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Protocolito-Linux.deb) |

            ## Notes for pilot testers

            - Use the Windows setup file on Windows. It installs the desktop app directly.
            - The Protocolito Cloud API is available at `https://api.protocolito.ch`.
            - A valid Protocolito license key is required before recording, importing, transcription, or summarization.
            - Google Calendar works with approved Google OAuth test users while the Google app is still in testing mode.

            ## Included in this release

            - Polished Apple-style visual refresh across the main app, settings, and search surfaces.
            - Redesigned conversational meeting search with suggested prompts and a fixed composer.
            - Improved Infomaniak model settings with allowed company models and safer stale-model handling.
            - Protocolito Cloud URL normalization from the old raw IP to `https://api.protocolito.ch`.
