<svg width="400" height="160" viewBox="0 0 400 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1-full" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="gradient2-full" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10, 30)">
    <!-- Document base -->
    <rect x="0" y="0" width="100" height="100" rx="12" fill="url(#gradient1-full)" opacity="0.95"/>

    <!-- AI Neural network nodes -->
    <circle cx="25" cy="25" r="6" fill="white" opacity="0.9"/>
    <circle cx="50" cy="18" r="6" fill="white" opacity="0.9"/>
    <circle cx="75" cy="25" r="6" fill="white" opacity="0.9"/>
    <circle cx="33" cy="50" r="6" fill="white" opacity="0.9"/>
    <circle cx="67" cy="50" r="6" fill="white" opacity="0.9"/>
    <circle cx="50" cy="75" r="6" fill="white" opacity="0.9"/>

    <!-- Neural network connections -->
    <line x1="25" y1="25" x2="50" y2="18" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="18" x2="75" y2="25" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="25" x2="33" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="75" y1="25" x2="67" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="33" y1="50" x2="50" y2="75" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="67" y1="50" x2="50" y2="75" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="18" x2="33" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="18" x2="67" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>

    <!-- Accent dot -->
    <circle cx="88" cy="12" r="12" fill="url(#gradient2-full)"/>
    <circle cx="88" cy="12" r="6" fill="white" opacity="0.9"/>
  </g>

  <!-- Text: Protocolito -->
  <text x="130" y="95" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#1f2937">
    protocol<tspan fill="url(#gradient1-full)">ito</tspan>
  </text>

  <!-- Subtitle -->
  <text x="132" y="118" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" letter-spacing="2">
    AI MEETING NOTES
  </text>
</svg>
